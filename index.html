<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>ระบบจองคิวคลินิกกายภาพบำบัด</title>
    <!-- MUI X Date Picker -->
    <script src="https://unpkg.com/dayjs/dayjs.min.js"></script>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/react-day-picker@8.10.1/dist/style.css"
    />

    <script src="https://unpkg.com/react-day-picker@8.10.1/dist/index.umd.js"></script>

    <script src="https://unpkg.com/@mui/x-date-pickers@6.19.4/umd/x-date-pickers.production.min.js"></script>

    <!-- React -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- MUI -->
    <script src="https://unpkg.com/@mui/material@5/umd/material-ui.production.min.js"></script>
    <script src="https://unpkg.com/@emotion/react@11.11.1/dist/emotion-react.umd.min.js"></script>
    <script src="https://unpkg.com/@emotion/styled@11.11.0/dist/emotion-styled.umd.min.js"></script>

    <!-- Papa Parse -->
    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

    <style>
      body {
        margin: 0;
        background: #f5f5f5;
        font-family: Arial, sans-serif;
      }
    </style>
  </head>

  <body>
    <div id="root"></div>

    <script type="text/babel">
      const {
        Container,
        Paper,
        Typography,
        Box,
        Select,
        MenuItem,
        FormControl,
        InputLabel,
        Table,
        TableBody,
        TableCell,
        TableContainer,
        TableHead,
        TableRow,
        Stack,
        TextField,
        Button,
        CircularProgress,
      } = MaterialUI;

      const CSV_URL =
        "https://docs.google.com/spreadsheets/d/1NPcJXZUBD3Qe7iKzs97h--0nk_cU8fpaJ7-BIqej_fE/export?format=csv&gid=0";

      function App() {
        const [data, setData] = React.useState([]);
        const [filteredData, setFilteredData] = React.useState([]);

        const [dateFilter, setDateFilter] = React.useState(dayjs());
        const [search, setSearch] = React.useState("");
        const [loading, setLoading] = React.useState(true);
        const bookedDates = new Set(
          data.map((item) => item["วันที่จอง"]).filter(Boolean),
        );
        React.useEffect(() => {
          loadData();
        }, []);

        React.useEffect(() => {
          applyFilters();
        }, [dateFilter, search, data]);

        function selectToday() {
          const today = new Date()

            .toISOString()

            .split("T")[0];

          setDateFilter(today);
        }

        async function loadData() {
          setLoading(true);
          const response = await fetch(CSV_URL);
          const csvText = await response.text();

          const result = Papa.parse(csvText, {
            header: true,
            skipEmptyLines: true,
          });

          setData(result.data);

          const today = new Date().toISOString().split("T")[0];
          setDateFilter(today);

          const filteredToday = result.data.filter(
            (item) => item["วันที่จอง"] === today,
          );

          setFilteredData(filteredToday);
          setLoading(false);
        }

        function applyFilters() {
          let temp = [...data];

          if (dateFilter) {
            temp = temp.filter((item) => item["วันที่จอง"] === dateFilter);
          }

          if (search) {
            const keyword = search.toLowerCase();

            temp = temp.filter((row) => {
              return Object.values(row).some((value) =>
                String(value || "")
                  .toLowerCase()

                  .includes(keyword),
              );
            });
          }

          setFilteredData(temp);
        }

        const uniqueDates = [
          ...new Set(data.map((item) => item["วันที่จอง"]).filter(Boolean)),
        ];

        //let headers =
        filteredData.length > 0 ? Object.keys(filteredData[0]) : [];

        const headers = [
          "วันที่จอง",
          "ชื่อ - นามสกุล",
          "รหัสพนักงาน",
          "เบอร์โทรศัพท์",
          "ลักษณะการทำงาน",
          "E-mail",
          "ปัญหาสุขภาพ",
          "ประวัติการรักษา",
          "สถานที่รักษา",
          "เวลาบันทึก",
          "ช่วงเวลา",
        ];
        if (loading) {
          return (
            <Box
              display="flex"
              justifyContent="center"
              alignItems="center"
              height="100vh"
            >
              <CircularProgress />
            </Box>
          );
        }

        return (
          <Container
            maxWidth="xl"
            sx={{
              p: 2,
            }}
          >
            <Paper
              elevation={3}
              sx={{
                p: {
                  xs: 2,
                  md: 4,
                },
                borderRadius: 3,
              }}
            >
              <Box
                display="flex"
                justifyContent="space-between"
                alignItems="center"
                mb={3}
              >
                <Typography variant="h5" fontWeight="bold">
                  รายการจอง
                </Typography>

                <Button
                  variant="contained"
                  onClick={selectToday}
                  startIcon={
                    <img
                      src="https://media.tenor.com/oevF9HLc-acAAAAi/gato.gif"
                      width="20"
                      height="20"
                      style={{
                        imageRendering: "pixelated",
                      }}
                    />
                  }
                >
                  วันนี้
                </Button>
              </Box>

              <Stack
                direction={{
                  xs: "column",
                  sm: "row",
                }}
                spacing={2}
                mb={3}
              >
                <Box
                  sx={{
                    width: {
                      xs: "100%",

                      sm: 220,
                    },
                  }}
                >
                  <TextField
                    fullWidth
                    label="เลือกวันที่"
                    type="date"
                    value={dateFilter}
                    onChange={(e) => {
                      setDateFilter(e.target.value);
                    }}
                    InputLabelProps={{
                      shrink: true,
                    }}
                  />
                </Box>

                <datalist id="available-dates">
                  {uniqueDates.map((date) => (
                    <option key={date} value={date} />
                  ))}
                </datalist>

                <TextField
                  fullWidth
                  label="Search"
                  value={search}
                  onChange={(e) => {
                    setSearch(e.target.value);
                  }}
                />
              </Stack>

              <TableContainer
                sx={{
                  overflowX: "auto",
                }}
              >
                <Table size="small">
                  <TableHead>
                    <TableRow>
                      {headers.map((header) => (
                        <TableCell
                          key={header}
                          sx={{
                            fontWeight: "bold",
                            whiteSpace: "nowrap",
                            backgroundColor: "#fafafa",
                          }}
                        >
                          {header}
                        </TableCell>
                      ))}
                    </TableRow>
                  </TableHead>

                  <TableBody>
                    {filteredData.map((row, index) => (
                      <TableRow key={index}>
                        {headers.map((header) => (
                          <TableCell
                            key={header}
                            sx={{
                              whiteSpace: "nowrap",
                            }}
                          >
                            {row[header]}
                          </TableCell>
                        ))}
                      </TableRow>
                    ))}
                  </TableBody>
                </Table>
              </TableContainer>
            </Paper>
          </Container>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
