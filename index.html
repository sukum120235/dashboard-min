<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>ระบบจองคิวคลินิกกายภาพบำบัด</title>
    <!-- MUI X Date Picker -->
    <script src="https://unpkg.com/dayjs/dayjs.min.js"></script>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/react-day-picker@8.10.1/dist/style.css"
    />
<link href="https://fonts.googleapis.com/css2?family=Anuphan:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>

<script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>

<script src="https://unpkg.com/@babel/standalone@7.24.7/babel.min.js"></script>

<script src="https://unpkg.com/@mui/material@5.15.20/umd/material-ui.production.min.js"></script>
    <!-- Papa Parse -->
    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

    <style>
* {
  font-family: "Anuphan", sans-serif !important;
}
    </style>
  </head>

  <body>
    <div id="root"></div>

    <script type="text/babel">
      const {
        Container,
        Paper,
        Typography,
        Box,
        Select,
        MenuItem,
        FormControl,
        InputLabel,
        Table,
        TableBody,
        TableCell,
        TableContainer,
        TableHead,
        TableRow,
        Stack,
        TextField,
        Button,
        CircularProgress,
        Skeleton
      } = MaterialUI;

      const CSV_URL =
        "https://docs.google.com/spreadsheets/d/1NPcJXZUBD3Qe7iKzs97h--0nk_cU8fpaJ7-BIqej_fE/export?format=csv&gid=0";

      function App() {
        const [data, setData] = React.useState([]);
        const [filteredData, setFilteredData] = React.useState([]);

        const [dateFilter, setDateFilter] = React.useState(dayjs());
        const [search, setSearch] = React.useState("");
        const [loading, setLoading] = React.useState(true);
        const bookedDates = new Set(
          data.map((item) => item["วันที่จอง"]).filter(Boolean),
        );
        React.useEffect(() => {
          loadData();
        }, []);

        React.useEffect(() => {
          applyFilters();
        }, [dateFilter, search, data]);

        function selectToday() {
          const today = new Date()

            .toISOString()

            .split("T")[0];

          setDateFilter(today);
        }

async function loadData() {

  setLoading(true);

  const response =
    await fetch(CSV_URL);

  const csvText =
    await response.text();

  const result = Papa.parse(csvText, {
    header: true,
    skipEmptyLines: true,
  });

  const sortedData =
    [...result.data].sort((a, b) => {

      const dateA =
        a["วันที่จอง"] || "";

      const dateB =
        b["วันที่จอง"] || "";

      if (dateA !== dateB) {

        return dateA.localeCompare(dateB);

      }

      const timeA =
        a["ช่วงเวลา"] || "";

      const timeB =
        b["ช่วงเวลา"] || "";

      return timeA.localeCompare(timeB);

    });

  setData(sortedData);

  const today =
    new Date()
      .toISOString()
      .split("T")[0];

  setDateFilter(today);

  const filteredToday =
    sortedData.filter(
      item =>
        item["วันที่จอง"] === today
    );

  setFilteredData(filteredToday);

  setLoading(false);

}

function changeDate(days) {
  const current = new Date(dateFilter);

  current.setDate(current.getDate() + days);

  const newDate = current.toISOString().split("T")[0];

  setDateFilter(newDate);
}

function formatThaiDate(dateString) { if (!dateString) return ""; const date = new Date(dateString); return date.toLocaleDateString( "th-TH", { day: "numeric", month: "long", year: "numeric", } ); }


        function applyFilters() {
          let temp = [...data];

          if (dateFilter) {
            temp = temp.filter((item) => item["วันที่จอง"] === dateFilter);
          }

          if (search) {
            const keyword = search.toLowerCase();

            temp = temp.filter((row) => {
              return Object.values(row).some((value) =>
                String(value || "")
                  .toLowerCase()

                  .includes(keyword),
              );
            });
          }

          setFilteredData(temp);
        }

        const uniqueDates = [
          ...new Set(data.map((item) => item["วันที่จอง"]).filter(Boolean)),
        ];

        //let headers =
        filteredData.length > 0 ? Object.keys(filteredData[0]) : [];

        const headers = [
          "#",
          "วันที่จอง",
          "ช่วงเวลา",
          "ชื่อ - นามสกุล",
          "รหัสพนักงาน",
          "เบอร์โทรศัพท์",                 
          "ปัญหาสุขภาพ",
          "ประวัติการรักษา",
          "E-mail",
          "สถานที่รักษา",
          "เวลาบันทึก",
          "ลักษณะการทำงาน",
         
        ];


        return (
          <Container
            maxWidth="xl"
            sx={{
              p: 2,
            }}
          >
            <Paper
              elevation={3}
              sx={{
                p: {
                  xs: 2,
                  md: 4,
                },
                borderRadius: 3,
              }}
            >
              <Box
  display="flex"
  justifyContent="space-between"
  alignItems="center"
  mb={3}
>
  <Typography variant="h5" fontWeight="bold">
    รายการจอง
  </Typography>

 <Stack direction="row" spacing={1}>
  <Button
    size="small"
    variant="outlined"
    onClick={() => changeDate(-1)}
    sx={{
      minWidth: 36,
      px: 1,
    }}
  >
    ◀
  </Button>

  <Button
    size="small"
    variant="contained"
    onClick={selectToday}
    sx={{
      px: 1.5,
    }}
  >
    วันนี้
  </Button>

  <Button
    size="small"
    variant="outlined"
    onClick={() => changeDate(1)}
    sx={{
      minWidth: 36,
      px: 1,
    }}
  >
    ▶
  </Button>
</Stack>
</Box>

              <Stack
                direction={{
                  xs: "column",
                  sm: "row",
                }}
                spacing={2}
                mb={3}
              >
           
<Box
  sx={{
    width: {
      xs: "100%",
      sm: 240,
    },
  }}
>

  <Typography
    variant="caption"
    sx={{
      mb: 0.5,
      display: "block",
      opacity: 0.7,
    }}
  >
    วันที่:
    {" "}
    {formatThaiDate(dateFilter)}
  </Typography>

  <TextField
    fullWidth
    type="date"

    value={dateFilter}

    onChange={(e) => {
      setDateFilter(
        e.target.value
      );
    }}
  />

</Box>



                <datalist id="available-dates">
                  {uniqueDates.map((date) => (
                    <option key={date} value={date} />
                  ))}
                </datalist>

                <TextField
                  fullWidth
                  label="Search"
                  value={search}
                  onChange={(e) => {
                    setSearch(e.target.value);
                  }}
                />
              </Stack>

              <TableContainer
                sx={{
                  overflowX: "auto",
                }}
              >
                <Table size="small">
                  <TableHead>
                    <TableRow>
                      {headers.map((header) => (
                        <TableCell
                          key={header}
                          sx={{
                            fontWeight: "bold",
                            whiteSpace: "nowrap",
                            backgroundColor: "#fafafa",
                          }}
                        >
                          {header}
                        </TableCell>
                      ))}
                    </TableRow>
                  </TableHead>

                  <TableBody>
  {loading
    ? Array.from({ length: 8 }).map((_, i) => (
        <TableRow key={i}>
          {headers.map((h) => (
            <TableCell
              key={h}
              sx={{
                py: 0.75,
              }}
            >
              <Skeleton
                variant="text"
                height={20}
              />
            </TableCell>
          ))}
        </TableRow>
      ))
    : filteredData.map((row, index) => (
        <TableRow key={index}>
          {headers.map((header) => (
            <TableCell
              key={header}
              sx={{
                whiteSpace: "nowrap",
              }}
            >
              {header === "#" ? index + 1 : row[header]}
            </TableCell>
          ))}
        </TableRow>
      ))}
</TableBody>
                </Table>
              </TableContainer>
            </Paper>
          </Container>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
